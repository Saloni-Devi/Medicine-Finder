<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Medicine Details 💊</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="watchlist.html">Watchlist</a>
            </nav>
        </header>
        <div id="detailContent" class="detail-card"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const med = JSON.parse(localStorage.getItem(`med_${id}`));
        
        if (med) {
            document.getElementById('detailContent').innerHTML = `
                <h2>${med.openfda?.brand_name?.[0] || 'N/A'}</h2>
                <p><strong>Generic Name:</strong> ${med.openfda?.generic_name?.[0] || 'N/A'}</p>
                <p><strong>Purpose:</strong> ${med.purpose?.[0] || 'N/A'}</p>
                <p><strong>Usage:</strong> ${med.indications_and_usage?.[0] || 'N/A'}</p>
                <p><strong>Warnings:</strong> ${med.warnings?.[0] || 'N/A'}</p>
                <p><strong>Dosage:</strong> ${med.dosage_and_administration?.[0] || 'N/A'}</p>
                <button onclick="history.back()">Back</button>
            `;
        }
    </script>
</body>
</html>
